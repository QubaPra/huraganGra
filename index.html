<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HURALOKALIZATOR 2045</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="device-container">
        <header>
            <div class="top-bar">
                <span class="signal-icon">UPLINK <span id="uplink-status" class="status-inactive">[INACTIVE]</span></span>
                VER. 3.3.1945
            </div>
            <h1 id="main-title" data-text="HURALOKALIZATOR 2045">HURALOKALIZATOR 2045</h1>
            <p class="subtitle">Moduł Namierzania Danych</p>
        </header>

        <main id="scanner-area">
            <div id="radar-container" class="inactive">
                <div class="radar-circle">
                    <div class="radar-sweep"></div>
                </div>
                <div class="distance-wrapper">
                    <div id="distance-display">--<span class="unit">m</span></div>
                    <div id="status-text">OFFLINE</div>
                </div>
            </div>
        </main>

        <div id="controls-area">
            <button id="btn-toggle-scan" class="btn primary">INICJUJ SKANOWANIE</button>
        </div>

        <div id="evidence-alert" class="hidden">
            <div class="pulse-ring"></div>
            <div class="alert-content">
                <span class="alert-icon">⚠</span>
                <h3>WYKRYTO ZASOBY</h3>
                <button id="btn-open-evidence" class="btn danger">DEKRYPTUJ DANE</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
